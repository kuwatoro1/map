<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    #songPanel { position:fixed; top:20px; left:20px; width:360px; background:rgba(10,10,10,0.98); border:2px solid #ff4b2b; z-index:999999; display:none; padding:15px; border-radius:15px; color:white; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 20px rgba(255,75,43,0.3); }
    #radarContainer { position:fixed; top:20px; right:20px; width:450px; background:rgba(15,15,15,0.98); border:2px solid #00e6e6; z-index:999999; display:none; padding:15px; border-radius:15px; color:white; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,230,230,0.5); font-family: sans-serif; }
    .song-card { display:flex; gap:10px; background:rgba(255,255,255,0.08); margin-bottom:10px; border-radius:8px; overflow:hidden; border:1px solid #444; text-decoration:none; color:white; transition: 0.2s; }
    .song-card:hover { border-color:#ff4b2b; background:rgba(255,75,43,0.1); }
    .song-card img { width:120px; height:68px; object-fit:cover; background:#222; }
    .song-info { padding:8px; font-size:12px; line-height:1.2; font-weight:bold; }
    .match-item { background:rgba(255,255,255,0.07); padding:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #00e6e6; margin-bottom:5px;}
    .name-link { color: white; text-decoration: none; font-weight: bold; }
</style>

<div id="songPanel">
    <div style="font-size:18px; font-weight:bold; color:#ff4b2b; margin-bottom:15px; border-bottom:1px solid #444; padding-bottom:5px;">🎵 選曲リスト</div>
    <div id="songList"></div>
    <button onclick="closeAll()" style="width:100%; margin-top:10px; padding:12px; background:#444; color:white; border:none; border-radius:8px; cursor:pointer;">閉じる</button>
</div>

<div id="radarContainer">
    <div id="userName" style="font-size:28px; font-weight:bold; text-align:center;"></div>
    <div id="avgYearDisp" style="text-align:center; color:#ffb700; font-size:14px; margin: 10px 0;"></div>
    <div style="text-align:center;"><a id="xLink" href="#" target="_blank" style="color:#1DA1F2; text-decoration:none; font-size:13px; border:1px solid #1DA1F2; padding:8px 20px; border-radius:20px; background:rgba(29,161,242,0.1);">X ↗</a></div>
    <canvas id="radarCanvas" style="max-height:280px; width:100%;"></canvas>
    <div style="margin-top:20px; background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;"><canvas id="yearBarCanvas" style="height:100px;"></canvas></div>
    <div style="margin-top:20px; font-weight:bold; color:#00e6e6;">好みが近い人20選:</div>
    <div id="matchList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
var myRadar = null; var myBar = null;
function closeAll() { document.getElementById('songPanel').style.display='none'; document.getElementById('radarContainer').style.display='none'; }

var checkExist = setInterval(function() {
   if (typeof network !== 'undefined') {
      network.on("click", function (params) {
          if (params.nodes.length > 0) {
              var nodeId = params.nodes[0]; if (nodeId.startsWith("G_")) return;
              var node = nodes.get(nodeId);
              if (node && node.custom_data) {
                  var cData = JSON.parse(node.custom_data);
                  document.getElementById('songPanel').style.display = 'block';
                  document.getElementById('radarContainer').style.display = 'block';
                  document.getElementById('userName').innerText = node.label;
                  document.getElementById('avgYearDisp').innerText = "平均投稿年: " + cData.avg_year + "年";
                  document.getElementById('xLink').href = "https://x.com/" + cData.x_id;
                  
                  var sHtml = "";
                  cData.songs.forEach(s => {
                      sHtml += `<a href="${s.url}" target="_blank" class="song-card">
                        <img src="${s.thumb}" onerror="this.src='https://placehold.jp/24/333333/ffffff/120x68.png?text=No+Image'">
                        <div class="song-info">${s.title}</div></a>`;
                  });
                  document.getElementById('songList').innerHTML = sHtml;

                  var mHtml = "";
                  cData.matches.forEach(m => {
                      mHtml += `<div class="match-item"><a href="https://x.com/${m.x_id}" target="_blank" class="name-link">👤 ${m.name}</a><span><b>${m.sim}%</b></span></div>`;
                  });
                  document.getElementById('matchList').innerHTML = mHtml;

                  if (myRadar) myRadar.destroy();
                  myRadar = new Chart(document.getElementById('radarCanvas'), { type: 'radar', data: { labels: ['ロック','ポップ','爽やか','かわ','合成','ファン','和風','ネタ','病み','バラ','穏やか','トロ','エレ','ジャズ'], datasets: [{ data: cData.percents, backgroundColor: 'rgba(0, 230, 230, 0.4)', borderColor: '#00e6e6' }] }, options: { scales: { r: { min: 0, max: 100, ticks: { display: false }, pointLabels: { color: 'white' } } }, plugins: { legend: { display: false } } } });

                  if (myBar) myBar.destroy();
                  var yrs = Object.keys(cData.year_dist).sort();
                  myBar = new Chart(document.getElementById('yearBarCanvas'), { type: 'bar', data: { labels: yrs, datasets: [{ data: yrs.map(y => cData.year_dist[y]), backgroundColor: '#ffb700' }] }, options: { scales: { y: { display: false }, x: { ticks: { color: '#888' } } }, plugins: { legend: { display: false } } } });
              }
          }
      });
      clearInterval(checkExist);
   }
}, 1000);
</script>
