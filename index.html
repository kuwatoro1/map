<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Vocaloid Genre Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #network { width: 100vw; height: 100vh; }
        #radarContainer { position:fixed; top:20px; right:20px; width:450px; background:rgba(20,20,20,0.95); border:2px solid #00e6e6; z-index:999; display:none; padding:15px; border-radius:15px; box-shadow: 0 0 20px rgba(0,230,230,0.3); max-height: 90vh; overflow-y: auto; }
        .match-item { background:rgba(255,255,255,0.07); padding:8px 12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-left:4px solid #00e6e6; }
        .name-link { color: white; text-decoration: none; font-weight: bold; }
        .x-icon { color:#1DA1F2; margin-left:10px; font-size:18px; }
    </style>
</head>
<body>

<div id="network"></div>
<div id="radarContainer">
    <div id="userName" style="font-size:24px; font-weight:bold; text-align:center; margin-bottom:10px;"></div>
    <div style="text-align:center; margin-bottom:15px;"><a id="xLink" href="#" target="_blank" style="color:#1DA1F2; text-decoration:none; font-size:13px; border:1px solid #1DA1F2; padding:5px 15px; border-radius:20px;">Xを開く ↗</a></div>
    <canvas id="radarCanvas"></canvas>
    <div style="margin-top:20px; border-top:1px solid #444; padding-top:15px;">
        <div style="font-size:16px; color:#00e6e6; font-weight:bold; margin-bottom:10px;">好みが近い人20選</div>
        <div id="matchList"></div>
    </div>
    <button onclick="document.getElementById('radarContainer').style.display='none'" style="width:100%; margin-top:15px; padding:10px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">閉じる</button>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/15zh_PENwsRYFgzY7qWaZ_dCL4cos6ivgI8rV9yszz4g/export?format=csv";

const genreOrder = ["ロック", "ポップ", "爽やか・青春・青", "かわいい", "キャラソン・合成音声愛", "ファンタジー", "和風・民族調", "カオス・ネタ", "ダーク・病み", "バラード・静か", "オルタナ・穏やか・ポエトリー", "トロニカ", "エレクトロ", "ジャズ・おしゃれ"];
const genreColors = ["#ff4b2b", "#3cb44b", "#007bff", "#f032e6", "#fabebe", "#ffe119", "#911eb4", "#bfef45", "#800000", "#469990", "#9a6324", "#aaffc3", "#000075", "#808080"];
const islandPos = { "ロック": [-600, -600], "ポップ": [0, -600], "爽やか・青春・青": [600, -600], "かわいい": [-600, -200], "キャラソン・合成音声愛": [0, -200], "ファンタジー": [600, -200], "和風・民族調": [-600, 200], "カオス・ネタ": [0, 200], "ダーク・病み": [600, 200], "バラード・静か": [-600, 600], "オルタナ・穏やか・ポエトリー": [0, 600], "トロニカ": [600, 600], "エレクトロ": [-300, 950], "ジャズ・おしゃれ": [300, 950] };

let myRadar = null;

Papa.parse(CSV_URL, {
    download: true, header: true,
    complete: function(results) {
        const data = results.data.filter(r => r['参加者名']);
        const profiles = {};

        data.forEach(row => {
            const name = row['参加者名'];
            if (!profiles[name]) profiles[name] = { scores: {}, x_id: (row['XのID'] || "").replace('@',''), raw: [] };
            const m = row['メインジャンル'], s = row['サブジャンル'];
            if (genreOrder.includes(m)) profiles[name].scores[m] = (profiles[name].scores[m] || 0) + 0.6;
            if (genreOrder.includes(s)) profiles[name].scores[s] = (profiles[name].scores[s] || 0) + 0.4;
        });

        Object.keys(profiles).forEach(name => {
            const p = profiles[name];
            const total = Object.values(p.scores).reduce((a, b) => a + b, 0);
            p.raw = genreOrder.map(g => (p.scores[g] || 0) / (total || 1));
            const maxVal = Math.max(...Object.values(p.scores));
            p.maximized = genreOrder.map(g => Math.round(((p.scores[g] || 0) / (maxVal || 1)) * 100));
            p.top = genreOrder.reduce((a, b) => (p.scores[a] || 0) > (p.scores[b] || 0) ? a : b);
        });

        const nodes = new vis.DataSet();
        genreOrder.forEach(g => {
            nodes.add({ id: `G_${g}`, label: g, shape: 'text', x: islandPos[g][0], y: islandPos[g][1] - 250, fixed: true, font: { size: 60, color: 'white' } });
        });

        const counts = {};
        Object.keys(profiles).forEach(name => {
            const p = profiles[name];
            const g = p.top;
            counts[g] = (counts[g] || 0) + 1;
            const x = islandPos[g][0] + (counts[g] % 3 - 1) * 130;
            const y = islandPos[g][1] + Math.floor(counts[g] / 3) * 90;

            const matches = Object.keys(profiles)
                .filter(n => n !== name)
                .map(n => {
                    const dot = p.raw.reduce((sum, val, i) => sum + val * profiles[n].raw[i], 0);
                    const mag1 = Math.sqrt(p.raw.reduce((s, v) => s + v*v, 0));
                    const mag2 = Math.sqrt(profiles[n].raw.reduce((s, v) => s + v*v, 0));
                    return { name: n, sim: Math.round((dot / (mag1 * mag2)) * 100), x_id: profiles[n].x_id };
                })
                .sort((a, b) => b.sim - a.sim).slice(0, 20);

            nodes.add({ id: name, label: name, shape: 'dot', size: 25, x: x, y: y, fixed: true, color: genreColors[genreOrder.indexOf(g)], font: { size: 20, color: 'white', strokeWidth: 5, strokeColor: 'black' }, custom: { ...p, matches } });
        });

        const container = document.getElementById('network');
        const network = new vis.Network(container, { nodes }, { physics: false });

        network.on("click", function(params) {
            if (params.nodes.length > 0) {
                const id = params.nodes[0];
                if (id.startsWith("G_")) return;
                const node = nodes.get(id);
                const d = node.custom;
                document.getElementById('radarContainer').style.display = 'block';
                document.getElementById('userName').innerText = id;
                document.getElementById('xLink').href = d.x_id ? `https://x.com/${d.x_id}` : "#";
                
                let mHtml = "";
                d.matches.forEach(m => {
                    mHtml += `<div class="match-item"><a href="${m.x_id ? 'https://x.com/'+m.x_id : '#'}" target="_blank" class="name-link">👤 ${m.name}</a><span><b style="color:#00e6e6;">${m.sim}%</b> <i class="fa-brands fa-x-twitter x-icon"></i></span></div>`;
                });
                document.getElementById('matchList').innerHTML = mHtml;

                if (myRadar) myRadar.destroy();
                myRadar = new Chart(document.getElementById('radarCanvas'), {
                    type: 'radar',
                    data: { labels: genreOrder, datasets: [{ data: d.maximized, backgroundColor: 'rgba(0, 230, 230, 0.4)', borderColor: '#00e6e6' }] },
                    options: { scales: { r: { min: 0, max: 100, ticks: { display: false }, pointLabels: { color: 'white' } } }, plugins: { legend: { display: false } } }
                });
            }
        });
    }
});
</script>
</body>
</html>
